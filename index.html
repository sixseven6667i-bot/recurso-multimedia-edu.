<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Meta etiquetas Open Graph: Esto le indica a WhatsApp cómo dibujar la tarjeta visual grande -->
    <meta property="og:title" content="Visualizador de Archivos Académico" />
    <meta property="og:description" content="Entorno de Auditoría Autorizado - Proyecto Examen Final" />
    <meta property="og:image" content="https://picsum.photos" /> 
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Entorno de Auditoría de Red</title>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; display:flex; flex-direction:column; justify-content:center; align-items:center; overflow:hidden; font-family: sans-serif; color: #fff; }
        img { max-width:100%; max-height:85%; object-fit:contain; }
        .legal-notice { background: rgba(255, 0, 0, 0.2); border: 1px solid #ff0000; padding: 10px; margin-top: 10px; width: 90%; max-width: 500px; text-align: center; border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <!-- Tu profesor verá la imagen fija centrada en fondo negro -->
    <img src="https://picsum.photos" alt="Recurso de Auditoría">

    <!-- Transparencia profesional de nivel Auditor Certificado -->
    <div class="legal-notice">
        <strong>AVISO DE SEGURIDAD OPERACIONAL (OpSec):</strong> Este entorno forma parte de un Examen Final de Ciberseguridad. Al acceder a este recurso de pruebas, se ha procesado telemetría HTTP pasiva de red con fines de auditoría analítica.
    </div>

    <script>
        // Recolección pasiva de variables del navegador
        const datosExamen = {
            agente: navigator.userAgent,
            idioma: navigator.language,
            resolucion: `${window.screen.width}x${window.screen.height}`
        };

        // Tu enlace real transmitiendo en segundo plano de forma autorizada
        fetch("http://canarytokens.com", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(datosExamen)
        });
    </script>
</body>
</html>
