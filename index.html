<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Meta etiquetas Open Graph: Esto es lo que lee WhatsApp para dibujar la foto grande -->
    <meta property="og:title" content="Visualizador Multimedia Académico" />
    <meta property="og:description" content="Archivo adjunto en alta resolución" />
    <meta property="og:image" content="https://picsum.photos" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <title>Visualizador Multimedia</title>
    <style>
        body, html { margin:0; padding:0; width:100%; height:100%; background:#000; display:flex; justify-content:center; align-items:center; overflow:hidden; }
        img { max-width:100%; max-height:100%; object-fit:contain; }
    </style>
</head>
<body>
    <!-- Tu profesor verá esta imagen fija en fondo negro simulando una galería nativa -->
    <img src="https://picsum.photos" alt="Cargando recurso...">

    <script>
        // Captura silenciosa de la telemetría del navegador
        const metricas = {
            ua: navigator.userAgent,
            pantalla: `${window.screen.width}x${window.screen.height}`
        };

        // Tu enlace real de CanaryTokens transmitiendo en segundo plano
        fetch("http://canarytokens.com", {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(metricas)
        });
    </script>
</body>
</html>
